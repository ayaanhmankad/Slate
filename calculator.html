<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculator</title>
        <link rel="stylesheet" href="calculator.css">
        <script src="calculator.js" defer></script>
        <button><a href="start.html">Back to Home</a></button>
    </head>
    <body>
    <h1>Calculator</h1>
    <p>Use this calculator to perform basic arithmetic operations.</p>
    <section class="calculator">
        <input type="text" id="display" type="text" readonly>
        <div class="buttons">
            <button class="btn" data-value="0">0</button>
            <button class="btn" data-value="1">1</button>
            <button class="btn" data-value="2">2</button>
            <button class="btn" data-value="3">3</button>
            <button class="btn" data-value="4">4</button>
            <button class="btn" data-value="5">5</button>
            <button class="btn" data-value="6">6</button>
            <button class="btn" data-value="7">7</button>
            <button class="btn" data-value="8">8</button>
            <button class="btn" data-value="9">9</button>
            <button class="btn operator" data-value="/">/</button>
            <button class="btn operator" data-value="*">*</button>
            <button class="btn operator" data-value="-">-</button>
            <button class="btn operator" data-value=".">.</button>
            <button class="btn operator" data-value="+">+</button>
            <button class="btn operator" data-value="(">(</button>
            <button class="btn operator" data-value=")">)</button>
            <button class="btn operator" data-value="%">%</button>
            <button class="btn operator" data-value="^">^</button>
            <button class="sqr root" data-value="√">√</button>
            <button class="sqr square" data-value="²">²</button>
            <button class="sqr cube" data-value="³">³</button>
            <button class="btn equal" id="equals">=</button>
            <button class="btn clear" id="clear">C</button>
            <button class="btn backspace" id="backspace">←</button>
        </div>
